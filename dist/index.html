<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0;url=https://snewroof-portal.vercel.app/" />
  <title>Snewroof Customer Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f1e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #334155;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div>
    <div class="logo">🏠</div>
    <h1>Snewroof Customer Portal</h1>
    <p>Loading your portal...</p>
    <div class="spinner"></div>
    <a class="btn" href="https://snewroof-portal.vercel.app/">Open Portal</a>
  </div>
  <script>
    setTimeout(function () {
      window.location.href = 'https://snewroof-portal.vercel.app/';
    }, 1500);
  </script>
</body>

</html>
